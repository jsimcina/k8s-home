[env]
_.file = ["{{config_root}}/.secrets.env"]
FLATE_PATH = '{{config_root}}/kubernetes/flux/cluster'
KUBECONFIG = "{{config_root}}/kubeconfig"
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
TALOSCONFIG = "{{config_root}}/talosconfig"
JUST_UNSTABLE = "1"

[tools]
uv = "latest"
"pipx:flux-local" = "latest"
"pipx:makejinja" = "2.8.2"
"aqua:casey/just" = "1.56.0"
"aqua:cert-manager/cmctl" = "latest"
"aqua:cilium/cilium-cli" = "0.19.5"
"aqua:cli/cli" = "2.96.0"
"aqua:cloudflare/cloudflared" = "2026.7.1"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.9.1"
"aqua:helm/helm" = "latest"
"aqua:helmfile/helmfile" = "1.7.1"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.7.1"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.2"
"aqua:mikefarah/yq" = "4.53.3"
"aqua:siderolabs/talos" = "1.13.5"
"aqua:yannh/kubeconform" = "0.8.0"
"github:clbx/kubectl-browse-pvc" = "latest"
"github:charmbracelet/gum" = "v0.17.0"
"github:EnterpriseDB/kubectl-cnp" = "v1.30.0"
"github:mitsuhiko/minijinja" = "2.21.0"
"github:rook/kubectl-rook-ceph" = "latest"
vals = "0.44.4"
node = "latest"
oxfmt = "latest"

[hooks]
postinstall = "lefthook install"
