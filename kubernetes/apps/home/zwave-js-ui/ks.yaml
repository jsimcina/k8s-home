---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zwave-js-ui
spec:
  components:
    - ../../../../components/volsync
    - ../../../../components/kopiur
    - ../../../../components/zeroscaler
  dependsOn:
    - name: mosquitto
      namespace: database
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/home/zwave-js-ui/app
  postBuild:
    substitute:
      APP: zwave-js-ui
      ZEROSCALER_JOB_NAME: zwave_probe
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: home
  wait: false
