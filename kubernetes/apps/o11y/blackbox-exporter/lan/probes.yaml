---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: lan-icmp
spec:
  module: icmp
  prober:
    url: blackbox-exporter-lan.o11y.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - matter-server.jonandlinz.com
        - nas.jonandlinz.com
        - ntp.jonandlinz.com
        - pikvm.jonandlinz.com
        - ui.jonandlinz.com
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter-lan
      action: replace
---
