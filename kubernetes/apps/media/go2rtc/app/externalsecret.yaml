---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: go2rtc
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: go2rtc-secret
    template:
      templateFrom:
        - target: Data
          configMap:
            name: go2rtc
            items:
              - key: go2rtc.yaml
                templateAs: Values
  dataFrom:
    - extract:
        key: youtube-keys