---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: konflate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: konflate-secret
    template:
      data:
        KONFLATE_TOKEN: "{{ .IDE_Token }}"
        KONFLATE_WEBHOOK_SECRET: "{{ .WEBHOOK_TOKEN }}"
        KONFLATE_APP_CLIENT_ID: "{{ .GITHUB_BOT_APP_CLIENT_ID }}"
        KONFLATE_APP_PRIVATE_KEY: "{{ .GITHUB_BOT_APP_PRIVATE_KEY }}"
        #KONFLATE_APP_INSTALLATION_ID: "{{ .GITHUB_BOT_APP_ID }}"
  dataFrom:
    - extract:
        key: k8s-home-github
    - extract:
        key: konflate